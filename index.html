<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>KNEURAMEET™ · minimalist video meeting</title>
    <!-- Google Inter Font & PeerJS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ---------- RESET & GLOBAL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0c0e17, #05060a);
            color: #edf2fc;
            height: 100vh;
            overflow: hidden;
            font-weight: 400;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* ---------- HEADER (glassmorphic, touch‑friendly) ---------- */
        .header {
            padding: 0.75rem 1.5rem;
            background: rgba(12, 15, 26, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(72, 92, 128, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            z-index: 10;
        }

        .brand h1 {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FFFFFF 0%, #bdd3ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }
        .brand sup {
            font-size: 0.65rem;
            font-weight: 500;
            color: #7e9cd9;
            margin-left: 2px;
        }

        .room-panel {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .meeting-input {
            background: rgba(8, 12, 22, 0.9);
            border: 1px solid #2c3f5c;
            padding: 0.6rem 1rem;
            border-radius: 2.5rem;
            color: #f0f6ff;
            font-family: 'Inter', monospace;
            font-size: 0.85rem;
            width: min(180px, 45vw);
            transition: all 0.2s;
        }
        .meeting-input:focus {
            outline: none;
            border-color: #6c8fcf;
            box-shadow: 0 0 0 3px rgba(108, 143, 207, 0.2);
        }

        button {
            background: #1f2a3e;
            border: none;
            color: #eef3ff;
            padding: 0.6rem 1.1rem;
            border-radius: 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            min-height: 44px;
        }
        button i {
            margin-right: 6px;
        }
        button:hover {
            background: #2d3b58;
            transform: translateY(-1px);
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: monospace;
            border-left: 2px solid #4f7ac9;
            white-space: nowrap;
        }

        /* instruction bar */
        .instruction {
            background: rgba(17, 22, 35, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.5rem;
            font-size: 0.7rem;
            color: #b7ceff;
            border-bottom: 1px solid rgba(66, 88, 120, 0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        .instruction i {
            width: 1.3rem;
            color: #7c9fdf;
        }

        /* ---------- MAIN LAYOUT (flex, responsive) ---------- */
        .main-grid {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* Video grid area */
        .video-area {
            flex: 3;
            padding: 1rem;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
            align-content: start;
        }

        .video-tile {
            background: rgba(18, 22, 36, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(90, 120, 170, 0.4);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
            transition: transform 0.15s ease;
        }
        .video-tile:hover {
            border-color: rgba(120, 160, 220, 0.8);
            transform: scale(1.01);
        }
        .video-tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tile-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .mute-badge {
            background: #e05a4f;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.6rem;
            font-weight: 600;
        }

        /* chat panel – responsive width */
        .chat-panel {
            width: 280px;
            background: rgba(13, 16, 26, 0.85);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(72, 94, 128, 0.4);
            display: flex;
            flex-direction: column;
            transition: width 0.2s;
        }

        .chat-header {
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(60, 80, 110, 0.4);
            color: #d3e2ff;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-message {
            background: rgba(25, 32, 48, 0.7);
            padding: 0.5rem 0.9rem;
            border-radius: 1.2rem;
            max-width: 95%;
            font-size: 0.8rem;
        }
        .own-message {
            background: #2a3f66;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .msg-sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #baceff;
            margin-bottom: 4px;
        }
        .chat-input-area {
            padding: 0.8rem;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(60, 80, 110, 0.5);
            background: rgba(0, 0, 0, 0.2);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(8, 12, 22, 0.9);
            border: 1px solid #334561;
            border-radius: 2rem;
            padding: 10px 14px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            min-width: 0;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: #6f95db;
        }
        .chat-input-area button {
            background: #2a3d62;
            width: 44px;
            padding: 0;
            border-radius: 2rem;
            min-width: 44px;
        }

        /* controls bar – touch friendly */
        .controls {
            padding: 0.7rem 1rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(12, 15, 26, 0.75);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(72, 92, 128, 0.3);
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: #1f2c42;
            width: 52px;
            height: 52px;
            border-radius: 60px;
            font-size: 1.3rem;
            border: none;
            color: #eef2fc;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:hover {
            background: #314a72;
            transform: scale(1.03);
        }
        .ctrl-btn.active {
            background: #dc6b5b;
            color: white;
            box-shadow: 0 0 6px #ff8a7a;
        }
        .leave-btn {
            background: #a13e32;
        }
        .leave-btn:hover {
            background: #c24d3e;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #121624;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f5883;
            border-radius: 10px;
        }

        /* ---------- RESPONSIVE BREAKPOINTS ---------- */
        /* Landscape phones & small tablets */
        @media (max-width: 780px) {
            .chat-panel {
                width: 260px;
            }
            .video-area {
                grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
                gap: 0.8rem;
                padding: 0.8rem;
            }
            .ctrl-btn {
                width: 46px;
                height: 46px;
                font-size: 1.2rem;
            }
            .header {
                padding: 0.6rem 1rem;
            }
        }

        @media (max-width: 640px) {
            .chat-panel {
                width: 240px;
            }
            .video-area {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 0.7rem;
            }
            .ctrl-btn {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }
            .brand h1 {
                font-size: 1.2rem;
            }
            .room-panel button {
                padding: 0.5rem 0.8rem;
                font-size: 0.7rem;
            }
            .meeting-input {
                width: 140px;
                font-size: 0.75rem;
            }
            .status-badge {
                font-size: 0.65rem;
                padding: 0.3rem 0.7rem;
            }
        }

        /* small mobile devices (portrait) */
        @media (max-width: 550px) {
            .main-grid {
                flex-direction: column;
            }
            .chat-panel {
                width: 100%;
                height: 35%;
                border-left: none;
                border-top: 1px solid rgba(72, 94, 128, 0.4);
            }
            .video-area {
                height: 65%;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .controls {
                gap: 0.8rem;
                padding: 0.5rem;
            }
            .ctrl-btn {
                width: 44px;
                height: 44px;
            }
            .instruction {
                font-size: 0.65rem;
                gap: 0.8rem;
                padding: 0.5rem 1rem;
            }
        }

        /* Extra small devices (≤ 380px) */
        @media (max-width: 380px) {
            .video-area {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .tile-label {
                font-size: 0.6rem;
                padding: 2px 8px;
            }
            .chat-header {
                padding: 0.6rem;
            }
        }

        /* Landscape orientation on small devices (height < width) */
        @media (max-width: 850px) and (orientation: landscape) {
            .chat-panel {
                width: 230px;
            }
            .video-area {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            .controls {
                gap: 0.6rem;
                padding: 0.4rem;
            }
            .ctrl-btn {
                width: 40px;
                height: 40px;
            }
            .header {
                padding: 0.4rem 1rem;
            }
            .instruction {
                display: none; /* hides instruction to save space in landscape */
            }
        }

        /* Large desktop screens: increase video tile min-width */
        @media (min-width: 1400px) {
            .video-area {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 1.5rem;
            }
            .chat-panel {
                width: 320px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="brand">
            <h1>KNEURAMEET<sup>™</sup></h1>
        </div>
        <div class="room-panel">
            <input type="text" id="meetingIdInput" class="meeting-input" placeholder="meeting ID" autocomplete="off">
            <button id="createRoomBtn"><i class="fas fa-plus-circle"></i> Create</button>
            <button id="joinRoomBtn"><i class="fas fa-sign-in-alt"></i> Join</button>
            <span id="connectionStatus" class="status-badge">⚫ ready</span>
        </div>
    </div>

    <div class="instruction">
        <span><i class="fas fa-lightbulb"></i> how to use:</span>
        <span>❶ Creator: enter ID → "Create"</span>
        <span>❷ Others: same ID → "Join"</span>
        <span><i class="fas fa-shield-alt"></i> peer‑to‑peer · any device</span>
    </div>

    <div class="main-grid">
        <div class="video-area" id="videoGrid"></div>
        <div class="chat-panel">
            <div class="chat-header"><i class="far fa-comment-dots"></i> room chat</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatMsgInput" placeholder="message everyone...">
                <button id="sendChatBtn"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="toggleMicBtn"><i class="fas fa-microphone"></i></button>
        <button class="ctrl-btn" id="toggleVideoBtn"><i class="fas fa-video"></i></button>
        <button class="ctrl-btn" id="shareScreenBtn"><i class="fas fa-desktop"></i></button>
        <button class="ctrl-btn leave-btn" id="leaveBtn"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
    // ------------------- WEBRTC MESH WITH MANUAL ROOM ID (user generated) -------------------
    let myPeer = null;
    let localStream = null;
    let currentRoomId = null;
    let isHost = false;
    let peers = {};
    let isMicMuted = false;
    let isVideoOff = false;
    let screenShareStream = null;
    const username = "user-" + Math.floor(Math.random() * 900 + 100);
    
    // DOM elements
    const videoGrid = document.getElementById("videoGrid");
    const meetingIdInput = document.getElementById("meetingIdInput");
    const createRoomBtn = document.getElementById("createRoomBtn");
    const joinRoomBtn = document.getElementById("joinRoomBtn");
    const connectionStatus = document.getElementById("connectionStatus");
    const chatMessagesDiv = document.getElementById("chatMessages");
    const chatMsgInput = document.getElementById("chatMsgInput");
    const sendChatBtn = document.getElementById("sendChatBtn");
    const toggleMicBtn = document.getElementById("toggleMicBtn");
    const toggleVideoBtn = document.getElementById("toggleVideoBtn");
    const shareScreenBtn = document.getElementById("shareScreenBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    
    // helpers
    function addChatMessage(sender, text, isOwn = false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `chat-message ${isOwn ? 'own-message' : ''}`;
        msgDiv.innerHTML = `<div class="msg-sender">${escapeHtml(sender)}</div><div class="msg-text">${escapeHtml(text)}</div>`;
        chatMessagesDiv.appendChild(msgDiv);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function broadcastChat(text) {
        const payload = { type: 'chat', sender: username, text: text };
        for (let pid in peers) {
            if (peers[pid].dataConnection && peers[pid].dataConnection.open) {
                peers[pid].dataConnection.send(payload);
            }
        }
        addChatMessage(username, text, true);
    }
    
    // ---- video tiles ----
    function addLocalVideoTile() {
        let localTile = document.getElementById("localTile");
        if (!localTile) {
            localTile = document.createElement("div");
            localTile.className = "video-tile";
            localTile.id = "localTile";
            videoGrid.prepend(localTile);
        }
        localTile.innerHTML = "";
        const videoElem = document.createElement("video");
        videoElem.autoplay = true;
        videoElem.playsInline = true;
        videoElem.muted = true;
        if (localStream && !isVideoOff) videoElem.srcObject = localStream;
        localTile.appendChild(videoElem);
        const label = document.createElement("div");
        label.className = "tile-label";
        label.innerHTML = `<i class="fas fa-user-astronaut"></i> ${username} (you) ${isMicMuted ? '<span class="mute-badge"><i class="fas fa-microphone-slash"></i> muted</span>' : ''}`;
        localTile.appendChild(label);
        if (isVideoOff) {
            videoElem.style.display = "none";
            const fallback = document.createElement("div");
            fallback.style.position = "absolute";
            fallback.style.inset = "0";
            fallback.style.background = "linear-gradient(145deg, #1e253f, #0c0f1c)";
            fallback.style.display = "flex";
            fallback.style.alignItems = "center";
            fallback.style.justifyContent = "center";
            fallback.innerHTML = '<i class="fas fa-video-slash" style="font-size: 1.8rem; opacity:0.7;"></i>';
            localTile.appendChild(fallback);
        } else if (localStream) videoElem.style.display = "block";
    }
    
    function addRemoteVideo(peerId, stream, peerUsername) {
        let tile = document.getElementById(`tile-${peerId}`);
        if (!tile) {
            tile = document.createElement("div");
            tile.className = "video-tile";
            tile.id = `tile-${peerId}`;
            videoGrid.appendChild(tile);
        } else tile.innerHTML = "";
        const video = document.createElement("video");
        video.autoplay = true;
        video.playsInline = true;
        video.srcObject = stream;
        tile.appendChild(video);
        const label = document.createElement("div");
        label.className = "tile-label";
        label.innerHTML = `<i class="fas fa-user-friends"></i> ${peerUsername || peerId.slice(0,6)}`;
        tile.appendChild(label);
        if (peers[peerId]) peers[peerId].stream = stream;
    }
    
    function removeRemoteVideo(peerId) {
        const tile = document.getElementById(`tile-${peerId}`);
        if (tile) tile.remove();
        if (peers[peerId]) {
            if (peers[peerId].stream) peers[peerId].stream.getTracks().forEach(t => t.stop());
            delete peers[peerId];
        }
    }
    
    async function callPeer(peerId, stream) {
        if (!myPeer) return null;
        const call = myPeer.call(peerId, stream);
        if (!call) return null;
        call.on('stream', (remoteStream) => addRemoteVideo(peerId, remoteStream, peers[peerId]?.username));
        call.on('close', () => removeRemoteVideo(peerId));
        return call;
    }
    
    function answerCall(call, peerId) {
        if (!localStream) return;
        call.answer(localStream);
        call.on('stream', (stream) => addRemoteVideo(peerId, stream, peers[peerId]?.username));
        call.on('close', () => removeRemoteVideo(peerId));
    }
    
    function sharePeerList(connection, newPeerId) {
        const peerList = Object.keys(peers).filter(p => p !== myPeer.id && p !== newPeerId);
        peerList.push(myPeer.id);
        const usernames = {};
        for (let p of peerList) usernames[p] = (p === myPeer.id ? username : (peers[p]?.username || 'guest'));
        connection.send({ type: 'peerList', peers: peerList, usernames: usernames });
    }
    
    async function handleNewPeer(peerId, peerUsername) {
        if (peers[peerId] || peerId === myPeer?.id) return;
        const dataConn = myPeer.connect(peerId);
        dataConn.on('open', () => dataConn.send({ type: 'welcome', username: username }));
        dataConn.on('data', (data) => {
            if (data.type === 'chat') addChatMessage(data.sender, data.text, false);
            if (data.type === 'peerList') {
                data.peers.forEach(pid => { if (pid !== myPeer.id && !peers[pid]) handleNewPeer(pid, data.usernames?.[pid]); });
            }
        });
        const call = await callPeer(peerId, localStream);
        peers[peerId] = { dataConnection: dataConn, call: call, username: peerUsername };
        addChatMessage("System", `${peerUsername || peerId.slice(0,6)} joined`, false);
    }
    
    // HOST: fixed peer ID
    async function initAsHost(meetingId) {
        if (myPeer) myPeer.destroy();
        peers = {};
        videoGrid.innerHTML = '';
        myPeer = new Peer(meetingId, { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
        myPeer.on('open', async (id) => {
            connectionStatus.innerHTML = `<i class="fas fa-crown" style="color:#ffb347"></i> HOST · ${meetingId}`;
            currentRoomId = meetingId;
            isHost = true;
            addChatMessage("System", `🎤 Hosting meeting: ${meetingId}`, false);
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addLocalVideoTile();
            } catch(e) { addChatMessage("System", "⚠️ camera/mic required", false); return; }
        });
        myPeer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                connectionStatus.innerHTML = "❌ ID taken";
                addChatMessage("System", `ID "${meetingId}" already in use. Choose another or join.`, false);
                myPeer.destroy();
                myPeer = null;
            }
        });
        myPeer.on('call', (call) => {
            const peerId = call.peer;
            if (!peers[peerId]) peers[peerId] = {};
            answerCall(call, peerId);
            if (!peers[peerId].dataConnection) {
                const conn = myPeer.connect(peerId);
                conn.on('open', () => conn.send({ type: 'chat', sender: username, text: 'connected' }));
                conn.on('data', (data) => {
                    if (data.type === 'chat') addChatMessage(data.sender, data.text, false);
                    if (data.type === 'newPeer') handleNewPeer(data.peerId, data.username);
                });
                peers[peerId].dataConnection = conn;
            }
        });
        myPeer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'newPeer') {
                    if (!peers[data.peerId]) { handleNewPeer(data.peerId, data.username); sharePeerList(conn, data.peerId); }
                }
                if (data.type === 'chat') addChatMessage(data.sender, data.text, false);
            });
        });
    }
    
    // CLIENT: random peer, join meetingId
    async function initAsClient(meetingId) {
        if (myPeer) myPeer.destroy();
        peers = {};
        videoGrid.innerHTML = '';
        myPeer = new Peer(undefined, { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
        myPeer.on('open', async (id) => {
            connectionStatus.innerHTML = `<i class="fas fa-plug"></i> joining ${meetingId}...`;
            currentRoomId = meetingId;
            isHost = false;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addLocalVideoTile();
            } catch(e) { addChatMessage("System", "camera/mic needed", false); return; }
            const hostConn = myPeer.connect(meetingId);
            hostConn.on('open', () => {
                hostConn.send({ type: 'newPeer', peerId: myPeer.id, username: username });
                connectionStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#7bd86e"></i> joined: ${meetingId}`;
                addChatMessage("System", `✅ joined meeting: ${meetingId}`, false);
            });
            hostConn.on('data', (data) => {
                if (data.type === 'peerList') {
                    data.peers.forEach(pid => { if (pid !== myPeer.id) handleNewPeer(pid, data.usernames?.[pid]); });
                }
                if (data.type === 'chat') addChatMessage(data.sender, data.text, false);
            });
            const callToHost = await callPeer(meetingId, localStream);
            peers[meetingId] = { dataConnection: hostConn, call: callToHost, username: "host" };
        });
        myPeer.on('call', (call) => {
            const peerId = call.peer;
            if (!peers[peerId]) peers[peerId] = {};
            answerCall(call, peerId);
            if (!peers[peerId].dataConnection) {
                const conn = myPeer.connect(peerId);
                conn.on('open', () => conn.send({ type: 'chat', sender: username, text: 'hi' }));
                conn.on('data', (data) => {
                    if (data.type === 'chat') addChatMessage(data.sender, data.text, false);
                    if (data.type === 'newPeer') handleNewPeer(data.peerId, data.username);
                });
                peers[peerId].dataConnection = conn;
            }
        });
        myPeer.on('error', (err) => { addChatMessage("System", `join error: ${err.type}`, false); connectionStatus.innerHTML = "❌ join failed"; });
    }
    
    // UI event handlers
    async function onCreateRoom() {
        let meetingId = meetingIdInput.value.trim();
        if (!meetingId) { addChatMessage("System", "Enter meeting ID", false); return; }
        meetingId = meetingId.replace(/[^a-zA-Z0-9-]/g, '');
        if (meetingId.length < 3) { addChatMessage("System", "ID ≥ 3 characters", false); return; }
        await initAsHost(meetingId);
    }
    async function onJoinRoom() {
        let meetingId = meetingIdInput.value.trim();
        if (!meetingId) { addChatMessage("System", "Enter meeting ID to join", false); return; }
        meetingId = meetingId.replace(/[^a-zA-Z0-9-]/g, '');
        await initAsClient(meetingId);
    }
    
    function toggleMicrophone() {
        if (localStream) {
            isMicMuted = !isMicMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
            toggleMicBtn.classList.toggle('active', isMicMuted);
            addLocalVideoTile();
        }
    }
    function toggleVideo() {
        if (localStream) {
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
            toggleVideoBtn.classList.toggle('active', isVideoOff);
            addLocalVideoTile();
        }
    }
    async function toggleScreenShare() {
        if (screenShareStream) {
            screenShareStream.getTracks().forEach(t => t.stop());
            screenShareStream = null;
            const newStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const oldVideo = localStream.getVideoTracks()[0];
            if (oldVideo) localStream.removeTrack(oldVideo);
            localStream.addTrack(newStream.getVideoTracks()[0]);
            localStream = newStream;
            shareScreenBtn.classList.remove('active');
            addLocalVideoTile();
            for (let pid in peers) {
                if (peers[pid].call) { peers[pid].call.close(); peers[pid].call = await callPeer(pid, localStream); }
            }
            return;
        }
        try {
            const displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            screenShareStream = displayStream;
            const videoTrack = displayStream.getVideoTracks()[0];
            const oldTrack = localStream.getVideoTracks()[0];
            if (oldTrack) localStream.removeTrack(oldTrack);
            localStream.addTrack(videoTrack);
            shareScreenBtn.classList.add('active');
            addLocalVideoTile();
            for (let pid in peers) {
                if (peers[pid].call) { peers[pid].call.close(); peers[pid].call = await callPeer(pid, localStream); }
            }
            videoTrack.onended = () => toggleScreenShare();
        } catch(e) { addChatMessage("System", "screen share cancelled", false); }
    }
    function leaveMeeting() {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (screenShareStream) screenShareStream.getTracks().forEach(t => t.stop());
        if (myPeer) myPeer.destroy();
        location.reload();
    }
    
    createRoomBtn.onclick = onCreateRoom;
    joinRoomBtn.onclick = onJoinRoom;
    toggleMicBtn.onclick = toggleMicrophone;
    toggleVideoBtn.onclick = toggleVideo;
    shareScreenBtn.onclick = toggleScreenShare;
    leaveBtn.onclick = leaveMeeting;
    sendChatBtn.onclick = () => { const msg = chatMsgInput.value.trim(); if (msg) { broadcastChat(msg); chatMsgInput.value = ""; } };
    chatMsgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendChatBtn.click(); });
    
    connectionStatus.innerHTML = "✨ create or join a room";
</script>
</body>
</html>
