<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>KNEURAMEET™ · minimalist video meeting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:radial-gradient(circle at 20% 30%,#0c0e17,#05060a);color:#edf2fc;height:100vh;overflow:hidden;font-weight:400;line-height:1.5;-webkit-tap-highlight-color:transparent;}
        .app{display:flex;flex-direction:column;height:100vh;width:100%;}

        /* HEADER */
        .header{padding:.75rem 1.5rem;background:rgba(12,15,26,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(72,92,128,.3);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem;z-index:10;}
        .brand{display:flex;align-items:center;gap:.5rem;}
        .brand h1{font-size:clamp(1.3rem,5vw,1.8rem);font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 0%,#bdd3ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap;}
        .brand sup{font-size:.65rem;font-weight:500;color:#7e9cd9;margin-left:2px;}
        .participant-count{background:rgba(79,122,201,.15);border:1px solid rgba(79,122,201,.35);border-radius:2rem;padding:.25rem .75rem;font-size:.7rem;color:#9db8f0;font-weight:600;white-space:nowrap;}

        .room-panel{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;}
        .meeting-input{background:rgba(8,12,22,.9);border:1px solid #2c3f5c;padding:.6rem 1rem;border-radius:2.5rem;color:#f0f6ff;font-family:'Inter',monospace;font-size:.85rem;width:min(180px,45vw);transition:all .2s;}
        .meeting-input:focus{outline:none;border-color:#6c8fcf;box-shadow:0 0 0 3px rgba(108,143,207,.2);}

        button{background:#1f2a3e;border:none;color:#eef3ff;padding:.6rem 1.1rem;border-radius:2.5rem;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s ease;backdrop-filter:blur(4px);white-space:nowrap;min-height:44px;}
        button i{margin-right:6px;}
        button:hover{background:#2d3b58;transform:translateY(-1px);}
        button:active{transform:translateY(0);}

        .status-badge{background:rgba(0,0,0,.55);backdrop-filter:blur(4px);padding:.4rem 1rem;border-radius:2rem;font-size:.7rem;font-weight:500;font-family:monospace;border-left:2px solid #4f7ac9;white-space:nowrap;display:flex;align-items:center;gap:.4rem;}
        .status-dot{width:7px;height:7px;border-radius:50%;background:#4f7ac9;flex-shrink:0;}
        .status-dot.active{background:#7bd86e;animation:pulse 1.5s infinite;}
        .status-dot.error{background:#e05a4f;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

        /* INSTRUCTION */
        .instruction{background:rgba(17,22,35,.7);backdrop-filter:blur(8px);padding:.6rem 1.5rem;font-size:.7rem;color:#b7ceff;border-bottom:1px solid rgba(66,88,120,.3);display:flex;flex-wrap:wrap;gap:1rem;align-items:center;}
        .instruction i{width:1.3rem;color:#7c9fdf;}

        /* MAIN LAYOUT */
        .main-grid{display:flex;flex:1;overflow:hidden;min-height:0;}

        /* VIDEO */
        .video-area{flex:3;padding:1rem;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;align-content:start;}
        .video-tile{background:rgba(18,22,36,.8);backdrop-filter:blur(4px);border-radius:1.5rem;aspect-ratio:16/9;position:relative;overflow:hidden;border:1px solid rgba(90,120,170,.4);box-shadow:0 6px 14px rgba(0,0,0,.25);transition:transform .15s ease;}
        .video-tile:hover{border-color:rgba(120,160,220,.8);transform:scale(1.01);}
        .video-tile video{width:100%;height:100%;object-fit:cover;}
        .tile-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.65);backdrop-filter:blur(12px);padding:4px 12px;border-radius:40px;font-size:.7rem;font-weight:500;display:flex;align-items:center;gap:8px;pointer-events:none;}
        .mute-badge{background:#e05a4f;border-radius:20px;padding:2px 8px;font-size:.6rem;font-weight:600;}
        .video-off-overlay{position:absolute;inset:0;background:linear-gradient(145deg,#1e253f,#0c0f1c);display:flex;align-items:center;justify-content:center;font-size:1.8rem;opacity:.7;}

        /* CHAT */
        .chat-panel{width:280px;background:rgba(13,16,26,.85);backdrop-filter:blur(12px);border-left:1px solid rgba(72,94,128,.4);display:flex;flex-direction:column;}
        .chat-header{padding:.9rem 1rem;font-size:.85rem;font-weight:600;border-bottom:1px solid rgba(60,80,110,.4);color:#d3e2ff;display:flex;align-items:center;justify-content:space-between;}
        .chat-messages{flex:1;overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:10px;}
        .chat-message{background:rgba(25,32,48,.7);padding:.5rem .9rem;border-radius:1.2rem;max-width:95%;font-size:.8rem;}
        .own-message{background:#2a3f66;align-self:flex-end;border-bottom-right-radius:6px;}
        .system-message{background:rgba(79,122,201,.12);border:1px solid rgba(79,122,201,.2);color:#9db8f0;font-style:italic;font-size:.72rem;}
        .msg-sender{font-size:.7rem;font-weight:600;color:#baceff;margin-bottom:4px;}
        .chat-input-area{padding:.8rem;display:flex;gap:8px;border-top:1px solid rgba(60,80,110,.5);background:rgba(0,0,0,.2);}
        .chat-input-area input{flex:1;background:rgba(8,12,22,.9);border:1px solid #334561;border-radius:2rem;padding:10px 14px;color:#fff;font-family:'Inter',sans-serif;font-size:.8rem;min-width:0;}
        .chat-input-area input:focus{outline:none;border-color:#6f95db;}
        .chat-input-area button{background:#2a3d62;width:44px;padding:0;border-radius:2rem;min-width:44px;}
        .chat-input-area button:hover{background:#3a5080;}

        /* CONTROLS */
        .controls{padding:.7rem 1rem;display:flex;justify-content:center;gap:1rem;background:rgba(12,15,26,.75);backdrop-filter:blur(16px);border-top:1px solid rgba(72,92,128,.3);flex-wrap:wrap;}
        .ctrl-btn{background:#1f2c42;width:52px;height:52px;border-radius:60px;font-size:1.3rem;border:none;color:#eef2fc;transition:all .2s;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-height:unset;padding:0;}
        .ctrl-btn:hover{background:#314a72;transform:scale(1.05);}
        .ctrl-btn.active{background:#dc6b5b;color:#fff;box-shadow:0 0 10px rgba(220,107,91,.5);}
        .ctrl-btn i{margin-right:0;}
        .leave-btn{background:#a13e32;}
        .leave-btn:hover{background:#c24d3e;}

        /* SCROLLBAR */
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:#121624;border-radius:10px;}
        ::-webkit-scrollbar-thumb{background:#3f5883;border-radius:10px;}

        /* FILE SHARING */
        .file-card{background:rgba(20,28,48,.9);border:1px solid rgba(79,122,201,.3);border-radius:1rem;padding:.75rem 1rem;display:flex;flex-direction:column;gap:.5rem;max-width:95%;font-size:.78rem;}
        .file-card.own{align-self:flex-end;border-color:rgba(79,122,201,.5);}
        .file-card-top{display:flex;align-items:center;gap:.6rem;}
        .file-icon{width:34px;height:34px;background:rgba(79,122,201,.2);border-radius:.6rem;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#7ca8e8;flex-shrink:0;}
        .file-info{flex:1;min-width:0;}
        .file-name{font-weight:600;color:#d3e4ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.78rem;}
        .file-meta-text{font-size:.68rem;color:#6a8ab0;margin-top:2px;}
        .file-progress{height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
        .file-progress-bar{height:100%;background:linear-gradient(90deg,#4f7ac9,#7ca8e8);border-radius:4px;transition:width .3s ease;width:0%;}
        .file-dl-btn{background:#1f3a6e;border:1px solid rgba(79,122,201,.4);color:#9db8f0;padding:.35rem .8rem;border-radius:1.5rem;font-size:.72rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;align-self:flex-start;transition:all .2s;min-height:unset;}
        .file-dl-btn:hover{background:#2a4d8c;color:#fff;}
        .attach-btn{background:#1e3052;width:36px;height:36px;border-radius:50%;padding:0;min-height:unset;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
        .attach-btn:hover{background:#2a4470;}
        #fileInput{display:none;}

        /* EMPTY STATE */
        .empty-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:#4a6090;padding:3rem;text-align:center;}
        .empty-state i{font-size:3rem;opacity:.4;}
        .empty-state p{font-size:.85rem;opacity:.6;max-width:280px;}

        /* RESPONSIVE */
        @media(max-width:780px){.chat-panel{width:260px;}.video-area{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.8rem;padding:.8rem;}.ctrl-btn{width:46px;height:46px;font-size:1.2rem;}.header{padding:.6rem 1rem;}}
        @media(max-width:640px){.chat-panel{width:240px;}.video-area{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.7rem;}.ctrl-btn{width:44px;height:44px;font-size:1.1rem;}.brand h1{font-size:1.2rem;}.room-panel button{padding:.5rem .8rem;font-size:.7rem;}.meeting-input{width:140px;font-size:.75rem;}.status-badge{font-size:.65rem;padding:.3rem .7rem;}}
        @media(max-width:550px){.main-grid{flex-direction:column;}.chat-panel{width:100%;height:35%;border-left:none;border-top:1px solid rgba(72,94,128,.4);}.video-area{height:65%;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}.controls{gap:.8rem;padding:.5rem;}.ctrl-btn{width:44px;height:44px;}.instruction{font-size:.65rem;gap:.8rem;padding:.5rem 1rem;}}
        @media(max-width:380px){.video-area{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}.ctrl-btn{width:40px;height:40px;font-size:1rem;}.tile-label{font-size:.6rem;padding:2px 8px;}.chat-header{padding:.6rem;}}
        @media(max-width:850px) and (orientation:landscape){.chat-panel{width:230px;}.video-area{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}.controls{gap:.6rem;padding:.4rem;}.ctrl-btn{width:40px;height:40px;}.header{padding:.4rem 1rem;}.instruction{display:none;}}
        @media(min-width:1400px){.video-area{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;}.chat-panel{width:320px;}}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="brand">
            <h1>KNEURAMEET<sup>™</sup></h1>
            <span class="participant-count" id="participantCount"><i class="fas fa-users"></i> 0</span>
        </div>
        <div class="room-panel">
            <input type="text" id="meetingIdInput" class="meeting-input" placeholder="meeting ID" autocomplete="off" maxlength="32">
            <button id="createRoomBtn"><i class="fas fa-plus-circle"></i> Create</button>
            <button id="joinRoomBtn"><i class="fas fa-sign-in-alt"></i> Join</button>
            <span id="connectionStatus" class="status-badge"><span class="status-dot" id="statusDot"></span><span id="statusText">ready</span></span>
        </div>
    </div>

    <div class="instruction">
        <span><i class="fas fa-lightbulb"></i> how to use:</span>
        <span>❶ Creator: enter ID → "Create"</span>
        <span>❷ Others: same ID → "Join"</span>
        <span><i class="fas fa-shield-alt"></i> peer‑to‑peer · any device</span>
    </div>

    <div class="main-grid">
        <div class="video-area" id="videoGrid">
            <div class="empty-state" id="emptyState">
                <i class="fas fa-video"></i>
                <p>Create or join a room to start your meeting</p>
            </div>
        </div>
        <div class="chat-panel">
            <div class="chat-header">
                <span><i class="far fa-comment-dots"></i> room chat</span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="file" id="fileInput" multiple>
                <button class="attach-btn" id="attachBtn" title="Share a file"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="chatMsgInput" placeholder="message everyone...">
                <button id="sendChatBtn"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="toggleMicBtn" title="Mute/Unmute"><i class="fas fa-microphone"></i></button>
        <button class="ctrl-btn" id="toggleVideoBtn" title="Camera On/Off"><i class="fas fa-video"></i></button>
        <button class="ctrl-btn" id="shareScreenBtn" title="Share Screen"><i class="fas fa-desktop"></i></button>
        <button class="ctrl-btn leave-btn" id="leaveBtn" title="Leave Meeting"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
    // ── STATE ──────────────────────────────────────────────────────────────
    let myPeer = null, localStream = null, screenShareStream = null;
    let currentRoomId = null, isHost = false;
    let peers = {};       // peerId → { dataConnection, call, username, stream }
    let isMicMuted = false, isVideoOff = false;
    const username = "user-" + Math.floor(Math.random() * 900 + 100);

    // ── DOM ────────────────────────────────────────────────────────────────
    const videoGrid       = document.getElementById("videoGrid");
    const emptyState      = document.getElementById("emptyState");
    const meetingIdInput  = document.getElementById("meetingIdInput");
    const createRoomBtn   = document.getElementById("createRoomBtn");
    const joinRoomBtn     = document.getElementById("joinRoomBtn");
    const statusDot       = document.getElementById("statusDot");
    const statusText      = document.getElementById("statusText");
    const participantCount= document.getElementById("participantCount");
    const chatMessagesDiv = document.getElementById("chatMessages");
    const chatMsgInput    = document.getElementById("chatMsgInput");
    const sendChatBtn     = document.getElementById("sendChatBtn");
    const toggleMicBtn    = document.getElementById("toggleMicBtn");
    const toggleVideoBtn  = document.getElementById("toggleVideoBtn");
    const shareScreenBtn  = document.getElementById("shareScreenBtn");
    const leaveBtn        = document.getElementById("leaveBtn");

    // ── HELPERS ────────────────────────────────────────────────────────────
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function setStatus(text, state = 'idle') {
        statusText.textContent = text;
        statusDot.className = 'status-dot' + (state === 'active' ? ' active' : state === 'error' ? ' error' : '');
    }

    function updateParticipantCount() {
        const count = Object.keys(peers).length + 1; // +1 for self
        participantCount.innerHTML = `<i class="fas fa-users"></i> ${count}`;
    }

    function addChatMessage(sender, text, isOwn = false, isSystem = false) {
        const emptyState = chatMessagesDiv.querySelector('.chat-empty');
        if (emptyState) emptyState.remove();
        const d = document.createElement("div");
        d.className = `chat-message${isOwn ? ' own-message' : ''}${isSystem ? ' system-message' : ''}`;
        d.innerHTML = `<div class="msg-sender">${escapeHtml(sender)}</div><div class="msg-text">${escapeHtml(text)}</div>`;
        chatMessagesDiv.appendChild(d);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function broadcastChat(text) {
        const payload = { type: 'chat', sender: username, text };
        for (const pid in peers) {
            const conn = peers[pid].dataConnection;
            if (conn && conn.open) conn.send(payload);
        }
        addChatMessage(username, text, true);
    }

    // ── VIDEO TILE MANAGEMENT ──────────────────────────────────────────────
    function showEmptyState(show) {
        if (emptyState) emptyState.style.display = show ? 'flex' : 'none';
    }

    function addLocalVideoTile() {
        showEmptyState(false);
        let tile = document.getElementById("localTile");
        if (!tile) {
            tile = document.createElement("div");
            tile.className = "video-tile";
            tile.id = "localTile";
            videoGrid.prepend(tile);
        }
        tile.innerHTML = "";

        if (isVideoOff) {
            const overlay = document.createElement("div");
            overlay.className = "video-off-overlay";
            overlay.innerHTML = '<i class="fas fa-video-slash"></i>';
            tile.appendChild(overlay);
        } else {
            const vid = document.createElement("video");
            vid.autoplay = vid.playsInline = vid.muted = true;
            if (localStream) vid.srcObject = localStream;
            tile.appendChild(vid);
        }

        const label = document.createElement("div");
        label.className = "tile-label";
        label.innerHTML = `<i class="fas fa-user-astronaut"></i> ${escapeHtml(username)} (you)${isMicMuted ? ' <span class="mute-badge"><i class="fas fa-microphone-slash"></i> muted</span>' : ''}`;
        tile.appendChild(label);
        updateParticipantCount();
    }

    function addRemoteVideo(peerId, stream, peerUsername) {
        let tile = document.getElementById(`tile-${peerId}`);
        if (!tile) {
            tile = document.createElement("div");
            tile.className = "video-tile";
            tile.id = `tile-${peerId}`;
            videoGrid.appendChild(tile);
        }
        tile.innerHTML = "";
        const vid = document.createElement("video");
        vid.autoplay = vid.playsInline = true;
        vid.srcObject = stream;
        tile.appendChild(vid);
        const label = document.createElement("div");
        label.className = "tile-label";
        label.innerHTML = `<i class="fas fa-user-friends"></i> ${escapeHtml(peerUsername || peerId.slice(0,6))}`;
        tile.appendChild(label);
        if (peers[peerId]) peers[peerId].stream = stream;
        updateParticipantCount();
    }

    function removeRemoteVideo(peerId) {
        const tile = document.getElementById(`tile-${peerId}`);
        if (tile) tile.remove();
        if (peers[peerId]) {
            peers[peerId].stream?.getTracks().forEach(t => t.stop());
            delete peers[peerId];
        }
        updateParticipantCount();
        if (!document.getElementById("localTile") || Object.keys(peers).length === 0 && !localStream) {
            showEmptyState(true);
        }
    }

    // ── WEBRTC CALLS ───────────────────────────────────────────────────────
    async function callPeer(peerId, stream) {
        if (!myPeer || !stream) return null;
        const call = myPeer.call(peerId, stream);
        if (!call) return null;
        call.on('stream', remote => addRemoteVideo(peerId, remote, peers[peerId]?.username));
        call.on('close', () => removeRemoteVideo(peerId));
        return call;
    }

    function answerCall(call, peerId) {
        if (!localStream) return;
        call.answer(localStream);
        call.on('stream', stream => addRemoteVideo(peerId, stream, peers[peerId]?.username));
        call.on('close', () => removeRemoteVideo(peerId));
    }

    function sharePeerList(conn, newPeerId) {
        const list = Object.keys(peers).filter(p => p !== newPeerId);
        list.push(myPeer.id); // include host itself so client can call back
        const usernames = {};
        for (const p of list) usernames[p] = p === myPeer.id ? username : (peers[p]?.username || p.slice(0,6));
        conn.send({ type: 'peerList', peers: list, usernames });
    }

    // ── DATA CONNECTION HANDLER (client-side / peer-to-peer) ───────────────
    function setupDataConnection(conn, peerId) {
        conn.on('data', data => {
            if (data.type === 'chat') {
                addChatMessage(data.sender, data.text);
            } else if (data.type === 'file-meta' || data.type === 'file-chunk' || data.type === 'file-done') {
                handleFileMessage(data);
            } else if (data.type === 'peerList') {
                // Received after joining: connect to all existing peers
                data.peers.forEach(pid => {
                    if (pid === myPeer.id || peers[pid]) return;
                    const nc = myPeer.connect(pid);
                    peers[pid] = { dataConnection: nc, username: data.usernames?.[pid] || pid.slice(0,6), call: null };
                    setupDataConnection(nc, pid);
                    // FIX: callPeer is async — use .then() to assign result
                    callPeer(pid, localStream).then(call => { if (call && peers[pid]) peers[pid].call = call; });
                });
            }
        });
        conn.on('close', () => {
            removeRemoteVideo(peerId);
            addChatMessage("System", `A participant left`, false, true);
        });
        conn.on('error', err => console.warn('DataConn error', peerId, err));
    }

    // ── HOST INIT ──────────────────────────────────────────────────────────
    async function initAsHost(meetingId) {
        if (myPeer) myPeer.destroy();
        peers = {}; videoGrid.innerHTML = '';
        myPeer = new Peer(meetingId, { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });

        myPeer.on('open', async () => {
            setStatus(`HOST · ${meetingId}`, 'active');
            currentRoomId = meetingId; isHost = true;
            addChatMessage("System", `Hosting: ${meetingId}`, false, true);
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addLocalVideoTile();
            } catch(e) {
                addChatMessage("System", "⚠️ Camera/mic access denied", false, true);
                setStatus('media error', 'error');
            }
        });

        myPeer.on('error', err => {
            if (err.type === 'unavailable-id') {
                setStatus('ID taken', 'error');
                addChatMessage("System", `"${meetingId}" is taken. Try another.`, false, true);
                myPeer.destroy(); myPeer = null;
            } else {
                setStatus('error', 'error');
                console.error('Peer error:', err);
            }
        });

        // Incoming video call from a joiner
        myPeer.on('call', call => {
            const pid = call.peer;
            if (!peers[pid]) peers[pid] = { dataConnection: null, username: pid.slice(0,6), call: null };
            answerCall(call, pid);
            peers[pid].call = call;
        });

        // Incoming data connection from a joiner
        myPeer.on('connection', conn => {
            conn.on('data', data => {
                if (data.type === 'newPeer') {
                    const pid = data.peerId;
                    if (peers[pid]) return; // already registered
                    peers[pid] = { dataConnection: conn, username: data.username || pid.slice(0,6), call: null };
                    sharePeerList(conn, pid);
                    addChatMessage("System", `${peers[pid].username} joined`, false, true);
                    updateParticipantCount();
                } else if (data.type === 'chat') {
                    addChatMessage(data.sender, data.text);
                    // relay to all other peers
                    for (const pid in peers) {
                        if (peers[pid].dataConnection !== conn && peers[pid].dataConnection?.open) {
                            peers[pid].dataConnection.send(data);
                        }
                    }
                } else if (data.type === 'file-meta' || data.type === 'file-chunk' || data.type === 'file-done') {
                    handleFileMessage(data);
                    // relay file packets to all other peers
                    for (const pid in peers) {
                        if (peers[pid].dataConnection !== conn && peers[pid].dataConnection?.open) {
                            peers[pid].dataConnection.send(data);
                        }
                    }
                }
            });
            conn.on('close', () => {
                for (const pid in peers) {
                    if (peers[pid].dataConnection === conn) {
                        removeRemoteVideo(pid);
                        addChatMessage("System", `${peers[pid]?.username || 'A participant'} left`, false, true);
                        break;
                    }
                }
            });
        });
    }

    // ── CLIENT INIT ────────────────────────────────────────────────────────
    async function initAsClient(meetingId) {
        if (myPeer) myPeer.destroy();
        peers = {}; videoGrid.innerHTML = '';
        myPeer = new Peer(undefined, { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });

        myPeer.on('open', async id => {
            setStatus(`joining ${meetingId}…`, 'idle');
            currentRoomId = meetingId; isHost = false;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addLocalVideoTile();
            } catch(e) {
                addChatMessage("System", "Camera/mic access denied", false, true);
                setStatus('media error', 'error'); return;
            }

            const hostConn = myPeer.connect(meetingId);
            peers[meetingId] = { dataConnection: hostConn, username: "host", call: null };
            setupDataConnection(hostConn, meetingId);

            hostConn.on('open', () => {
                hostConn.send({ type: 'newPeer', peerId: id, username });
                setStatus(`joined: ${meetingId}`, 'active');
                addChatMessage("System", `✅ Joined: ${meetingId}`, false, true);
            });

            // FIX: await callPeer properly
            callPeer(meetingId, localStream).then(call => { if (call) peers[meetingId].call = call; });
        });

        myPeer.on('error', err => {
            setStatus('join failed', 'error');
            addChatMessage("System", `Error: ${err.type}`, false, true);
        });

        // Incoming calls from other mesh peers
        myPeer.on('call', call => {
            const pid = call.peer;
            if (!peers[pid]) peers[pid] = { dataConnection: null, username: pid.slice(0,6), call: null };
            answerCall(call, pid);
            peers[pid].call = call;
        });

        // Incoming data connections from other mesh peers
        myPeer.on('connection', conn => {
            const pid = conn.peer;
            if (!peers[pid]) peers[pid] = { dataConnection: conn, username: pid.slice(0,6), call: null };
            else peers[pid].dataConnection = conn;
            setupDataConnection(conn, pid);
        });
    }

    // ── MEDIA CONTROLS ─────────────────────────────────────────────────────
    function toggleMicrophone() {
        if (!localStream) return;
        isMicMuted = !isMicMuted;
        localStream.getAudioTracks().forEach(t => t.enabled = !isMicMuted);
        toggleMicBtn.classList.toggle('active', isMicMuted);
        toggleMicBtn.querySelector('i').className = isMicMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone';
        addLocalVideoTile();
    }

    function toggleVideo() {
        if (!localStream) return;
        isVideoOff = !isVideoOff;
        localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
        toggleVideoBtn.classList.toggle('active', isVideoOff);
        toggleVideoBtn.querySelector('i').className = isVideoOff ? 'fas fa-video-slash' : 'fas fa-video';
        addLocalVideoTile();
    }

    async function toggleScreenShare() {
        if (screenShareStream) {
            // Stop screen share → restore camera
            screenShareStream.getTracks().forEach(t => t.stop());
            screenShareStream = null;
            try {
                // FIX: simply get new stream; no redundant track manipulation
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                isVideoOff = false;
                shareScreenBtn.classList.remove('active');
                shareScreenBtn.querySelector('i').className = 'fas fa-desktop';
                addLocalVideoTile();
                for (const pid in peers) {
                    if (peers[pid].call) {
                        peers[pid].call.close();
                        peers[pid].call = await callPeer(pid, localStream);
                    }
                }
            } catch(e) { addChatMessage("System", "Could not restore camera", false, true); }
            return;
        }

        try {
            screenShareStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const track = screenShareStream.getVideoTracks()[0];
            // Replace video track in existing stream
            if (localStream.getVideoTracks()[0]) {
                localStream.removeTrack(localStream.getVideoTracks()[0]);
            }
            localStream.addTrack(track);
            shareScreenBtn.classList.add('active');
            shareScreenBtn.querySelector('i').className = 'fas fa-stop-circle';
            addLocalVideoTile();
            for (const pid in peers) {
                if (peers[pid].call) {
                    peers[pid].call.close();
                    peers[pid].call = await callPeer(pid, localStream);
                }
            }
            track.onended = () => toggleScreenShare();
        } catch(e) {
            screenShareStream = null;
            addChatMessage("System", "Screen share cancelled", false, true);
        }
    }

    function leaveMeeting() {
        localStream?.getTracks().forEach(t => t.stop());
        screenShareStream?.getTracks().forEach(t => t.stop());
        myPeer?.destroy();
        location.reload();
    }

    // ── UI BINDINGS ────────────────────────────────────────────────────────
    function sanitizeId(s) { return s.replace(/[^a-zA-Z0-9-]/g,''); }

    createRoomBtn.onclick = async () => {
        const id = sanitizeId(meetingIdInput.value.trim());
        if (id.length < 3) { addChatMessage("System", "Meeting ID must be ≥ 3 characters", false, true); return; }
        createRoomBtn.disabled = joinRoomBtn.disabled = true;
        await initAsHost(id);
        createRoomBtn.disabled = joinRoomBtn.disabled = false;
    };

    joinRoomBtn.onclick = async () => {
        const id = sanitizeId(meetingIdInput.value.trim());
        if (!id) { addChatMessage("System", "Enter a meeting ID to join", false, true); return; }
        createRoomBtn.disabled = joinRoomBtn.disabled = true;
        await initAsClient(id);
        createRoomBtn.disabled = joinRoomBtn.disabled = false;
    };

    toggleMicBtn.onclick = toggleMicrophone;
    toggleVideoBtn.onclick = toggleVideo;
    shareScreenBtn.onclick = toggleScreenShare;
    leaveBtn.onclick = leaveMeeting;

    sendChatBtn.onclick = () => {
        const msg = chatMsgInput.value.trim();
        if (msg) { broadcastChat(msg); chatMsgInput.value = ""; }
    };
    chatMsgInput.addEventListener("keypress", e => { if (e.key === "Enter") sendChatBtn.click(); });

    // Enter key on meeting input triggers create
    meetingIdInput.addEventListener("keypress", e => { if (e.key === "Enter") createRoomBtn.click(); });

    // ── FILE SHARING ───────────────────────────────────────────────────────
    const CHUNK_SIZE = 48 * 1024; // 48KB raw → ~64KB base64
    const MAX_WARN   = 100 * 1024 * 1024; // 100MB warn threshold
    let incomingFiles = {}; // fileId → { meta, chunks[], received }

    const fileInput = document.getElementById("fileInput");
    const attachBtn = document.getElementById("attachBtn");

    function formatBytes(n) {
        if (n < 1024) return n + ' B';
        if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
        return (n/1048576).toFixed(1) + ' MB';
    }

    function getFileIcon(mime) {
        if (!mime) return 'fa-file';
        if (mime.startsWith('image/'))     return 'fa-file-image';
        if (mime.startsWith('video/'))     return 'fa-file-video';
        if (mime.startsWith('audio/'))     return 'fa-file-audio';
        if (mime.includes('pdf'))          return 'fa-file-pdf';
        if (mime.includes('zip') || mime.includes('tar') || mime.includes('gzip')) return 'fa-file-archive';
        if (mime.includes('word') || mime.includes('document')) return 'fa-file-word';
        if (mime.includes('sheet') || mime.includes('excel'))   return 'fa-file-excel';
        if (mime.includes('text'))         return 'fa-file-alt';
        return 'fa-file';
    }

    // Render a file card in chat; returns { card, progressBar, setDone }
    function addFileCard(sender, name, size, mime, isOwn) {
        const wrap = document.createElement("div");
        wrap.className = `chat-message file-card${isOwn ? ' own' : ''}`;
        wrap.innerHTML = `
            <div class="msg-sender">${escapeHtml(sender)}</div>
            <div class="file-card-top">
                <div class="file-icon"><i class="fas ${getFileIcon(mime)}"></i></div>
                <div class="file-info">
                    <div class="file-name" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
                    <div class="file-meta-text">${formatBytes(size)}</div>
                </div>
            </div>
            <div class="file-progress"><div class="file-progress-bar"></div></div>
            <div class="file-actions"></div>`;
        chatMessagesDiv.appendChild(wrap);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        const bar = wrap.querySelector('.file-progress-bar');
        const actions = wrap.querySelector('.file-actions');
        return {
            setProgress(pct) { bar.style.width = pct + '%'; },
            setDone(url) {
                bar.style.width = '100%';
                bar.style.background = '#4caf7a';
                const a = document.createElement('a');
                a.className = 'file-dl-btn';
                a.href = url;
                a.download = name;
                a.innerHTML = '<i class="fas fa-download"></i> Download';
                actions.appendChild(a);
            },
            setError() { bar.style.background = '#e05a4f'; bar.style.width = '100%'; }
        };
    }

    // Broadcast a payload to all open data connections
    function broadcastData(payload) {
        for (const pid in peers) {
            const conn = peers[pid].dataConnection;
            if (conn && conn.open) conn.send(payload);
        }
    }

    // Send file to all peers via chunked base64
    async function sendFile(file) {
        if (!myPeer || Object.keys(peers).length === 0) {
            addChatMessage("System", "Join a meeting before sharing files", false, true); return;
        }
        if (file.size > MAX_WARN) {
            addChatMessage("System", `⚠️ Large file (${formatBytes(file.size)}) — transfer may be slow`, false, true);
        }

        const fileId = Date.now() + '-' + Math.random().toString(36).slice(2,7);
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        const meta = { type:'file-meta', fileId, name:file.name, size:file.size, mimeType:file.type, totalChunks, sender:username };

        const card = addFileCard(username, file.name, file.size, file.type, true);
        broadcastData(meta);

        const buf = await file.arrayBuffer();
        const bytes = new Uint8Array(buf);

        for (let i = 0; i < totalChunks; i++) {
            const slice = bytes.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
            // Encode chunk to base64
            let bin = '';
            for (let j = 0; j < slice.length; j++) bin += String.fromCharCode(slice[j]);
            const b64 = btoa(bin);
            broadcastData({ type:'file-chunk', fileId, index:i, data:b64 });
            card.setProgress(Math.round(((i+1)/totalChunks)*100));
            // Yield to keep UI responsive every 8 chunks
            if (i % 8 === 7) await new Promise(r => setTimeout(r, 0));
        }

        broadcastData({ type:'file-done', fileId });
        // Create local download from original file
        card.setDone(URL.createObjectURL(file));
    }

    // Handle incoming file-related messages
    function handleFileMessage(data) {
        if (data.type === 'file-meta') {
            incomingFiles[data.fileId] = {
                meta: data,
                chunks: new Array(data.totalChunks),
                received: 0,
                card: addFileCard(data.sender, data.name, data.size, data.mimeType, false)
            };
        } else if (data.type === 'file-chunk') {
            const f = incomingFiles[data.fileId];
            if (!f) return;
            f.chunks[data.index] = data.data;
            f.received++;
            f.card.setProgress(Math.round((f.received / f.meta.totalChunks) * 100));
        } else if (data.type === 'file-done') {
            const f = incomingFiles[data.fileId];
            if (!f) return;
            try {
                // Decode all base64 chunks → Uint8Array → Blob
                const totalLen = f.chunks.reduce((s, c) => s + atob(c).length, 0);
                const buf = new Uint8Array(totalLen);
                let off = 0;
                for (const b64 of f.chunks) {
                    const bin = atob(b64);
                    for (let i = 0; i < bin.length; i++) buf[off++] = bin.charCodeAt(i);
                }
                const blob = new Blob([buf], { type: f.meta.mimeType || 'application/octet-stream' });
                f.card.setDone(URL.createObjectURL(blob));
            } catch(e) {
                f.card.setError();
                addChatMessage("System", `File transfer error: ${f.meta.name}`, false, true);
            }
            delete incomingFiles[data.fileId];
        }
    }

    // File input binding
    attachBtn.onclick = () => { if (!localStream) { addChatMessage("System","Join a meeting first",false,true); return; } fileInput.click(); };
    fileInput.onchange = e => {
        Array.from(e.target.files).forEach(f => sendFile(f));
        fileInput.value = '';
    };

    // Drag-and-drop onto chat panel
    const chatPanel = document.querySelector('.chat-panel');
    chatPanel.addEventListener('dragover', e => { e.preventDefault(); chatPanel.style.outline = '2px dashed #4f7ac9'; });
    chatPanel.addEventListener('dragleave', () => { chatPanel.style.outline = ''; });
    chatPanel.addEventListener('drop', e => {
        e.preventDefault(); chatPanel.style.outline = '';
        if (!localStream) { addChatMessage("System","Join a meeting first",false,true); return; }
        Array.from(e.dataTransfer.files).forEach(f => sendFile(f));
    });

    // Init
    setStatus("ready");
    updateParticipantCount();
</script>
</body>
</html>
